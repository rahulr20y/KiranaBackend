version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: kirana-db
    environment:
      POSTGRES_DB: kirana_db
      POSTGRES_USER: kirana_user
      POSTGRES_PASSWORD: kirana_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirana_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kirana-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kirana-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kirana-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kirana-backend
    environment:
      DEBUG: "False"
      SECRET_KEY: django-insecure-your-secret-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,kirana-backend
      DB_ENGINE: postgresql
      DB_NAME: kirana_db
      DB_USER: kirana_user
      DB_PASSWORD: kirana_password_123
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kirana-network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn kirana.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kirana-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kirana-network

volumes:
  postgres_data:
  backend_static:
  backend_media:

networks:
  kirana-network:
    driver: bridge
